<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Jekafly</title>
    <meta name="description"
        content="This page doesn't exist. Return to Jekafly to apply for your visa or track your application." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://jekafly.com/" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="assets/css/404.css" />
    <link rel="stylesheet" href="mobile.css" media="(max-width: 768px)" />
</head>

<body>

    <nav id="main-nav">
        <a href="/" class="nav-logo">
            <img src="assets/images/JEKAFLY LOGO B-R 2.png" alt="Jekafly" />
        </a>
    </nav>

    <div class="nf-page">

        <div class="nf-hero">
            <img src="assets/images/404-plane.png" alt="Jekafly aircraft towing a 404 banner" class="nf-hero-img"
                onload="this.classList.add('loaded')" />
        </div>

        <div class="nf-content">
            <div class="nf-rule"></div>
            <h1 class="nf-heading">Page Not Found</h1>
            <p class="nf-sub">Looks like we hit some turbulence. The page you're looking for doesn't exist or may have
                been moved.</p>
            <div class="nf-actions">
                <a href="/" class="nf-btn-primary">
                    Back to Home
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </a>
                <a href="/dashboard" class="nf-btn-outline">My Dashboard</a>
            </div>
        </div>

    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="mobile.js" defer></script>
    <script>
        window.addEventListener('scroll', () => {
            document.querySelector('nav')?.classList.toggle('scrolled', window.scrollY > 20);
        });
    </script>

</body>

</html>
