<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Page Not Found — Jekafly</title>
    <meta name="description"
        content="This page doesn't exist. Return to Jekafly to apply for your visa or track your application." />
    <meta name="robots" content="noindex, follow" />
    <link rel="canonical" href="https://jekafly.com/" />
    <link rel="icon" type="image/svg+xml" href="favicon.svg" />
    <link rel="icon" type="image/x-icon" href="favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png" />
    <link rel="manifest" href="site.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="assets/css/styles.css" />
    <link rel="stylesheet" href="mobile.css" media="(max-width: 768px)" />
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #fff;
            overflow-x: hidden;
            min-height: 100vh;
        }

        /* ── Nav ── */
        nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid #E3E5F5;
            padding: 0 5%;
            height: 68px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: box-shadow 0.2s;
        }

        nav.scrolled {
            box-shadow: 0 2px 16px rgba(13, 21, 96, 0.07);
        }

        .nav-logo img {
            height: 32px;
            width: auto;
            display: block;
        }

        .nav-right {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .nav-link {
            padding: 8px 16px;
            border: 1.5px solid #E3E5F5;
            border-radius: 9px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            font-weight: 600;
            color: #0F1124;
            text-decoration: none;
            transition: border-color 0.18s, color 0.18s;
        }

        .nav-link:hover {
            border-color: #0D1560;
            color: #0D1560;
        }

        .nav-cta-btn {
            padding: 9px 20px;
            background: #0D1560;
            border: none;
            border-radius: 9px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.875rem;
            font-weight: 700;
            color: white;
            text-decoration: none;
            transition: background 0.18s, transform 0.18s;
        }

        .nav-cta-btn:hover {
            background: #090F4A;
            transform: translateY(-1px);
        }

        /* ── Full-page layout: image top, content centred below ── */
        .nf-page {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            padding-top: 68px;
        }

        /* ── Plane hero image ── */
        .nf-hero {
            width: 100%;
            position: relative;
            line-height: 0;
            flex-shrink: 0;
        }

        .nf-hero-img {
            width: 100%;
            height: auto;
            display: block;
            /* Dissolve bottom edge into white */
            -webkit-mask-image: linear-gradient(to bottom,
                    black 0%,
                    black 50%,
                    rgba(0, 0, 0, 0.4) 78%,
                    transparent 100%);
            mask-image: linear-gradient(to bottom,
                    black 0%,
                    black 50%,
                    rgba(0, 0, 0, 0.4) 78%,
                    transparent 100%);
            animation: planeSlide 1.8s cubic-bezier(0.16, 1, 0.3, 1) both;
        }

        @keyframes planeSlide {
            from {
                opacity: 0;
                transform: translateX(48px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Gentle float after entry */
        .nf-hero-img.loaded {
            animation:
                planeSlide 1.8s cubic-bezier(0.16, 1, 0.3, 1) both,
                planeFloat 4.5s ease-in-out 1.8s infinite;
        }

        @keyframes planeFloat {

            0%,
            100% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-7px);
            }
        }

        /* ── Text content ── */
        .nf-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 8px 24px 72px;
            background: #fff;
            opacity: 0;
            animation: contentIn 0.7s ease 1.2s forwards;
        }

        @keyframes contentIn {
            from {
                opacity: 0;
                transform: translateY(14px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Red rule — sole 404 echo, small and tasteful */
        .nf-rule {
            width: 56px;
            height: 4px;
            border-radius: 2px;
            background: #E31E24;
            margin: 0 auto 22px;
        }

        .nf-heading {
            font-size: clamp(1.4rem, 3.5vw, 2rem);
            font-weight: 700;
            color: #0D1560;
            letter-spacing: -0.03em;
            line-height: 1.2;
            margin-bottom: 14px;
            font-family: 'Poppins', sans-serif;
        }

        .nf-sub {
            font-size: clamp(0.88rem, 1.8vw, 1rem);
            color: #7480A0;
            line-height: 1.75;
            max-width: 400px;
            font-weight: 400;
            margin-bottom: 40px;
        }

        /* Buttons */
        .nf-actions {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .btn-primary-404 {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            padding: 15px 40px;
            background: #0D1560;
            color: white;
            border: none;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.97rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: background 0.18s, transform 0.18s, box-shadow 0.18s;
            box-shadow: 0 4px 18px rgba(13, 21, 96, 0.28);
        }

        .btn-primary-404:hover {
            background: #090F4A;
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(13, 21, 96, 0.38);
        }

        .btn-primary-404:active {
            transform: translateY(0);
        }

        .btn-ghost-404 {
            display: inline-flex;
            align-items: center;
            padding: 14px 36px;
            background: transparent;
            color: #0D1560;
            border: 2px solid #E3E5F5;
            border-radius: 12px;
            font-family: 'Poppins', sans-serif;
            font-size: 0.97rem;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: -0.01em;
            cursor: pointer;
            transition: border-color 0.18s, background 0.18s;
        }

        .btn-ghost-404:hover {
            border-color: #0D1560;
            background: #F5F6FC;
        }

        /* ── Mobile ── */
        @media (max-width: 640px) {
            .nav-link {
                display: none;
            }

            .nf-hero-img {
                object-fit: cover;
                height: 54vw;
                min-height: 200px;
                object-position: center top;
            }

            .nf-content {
                padding: 4px 20px 56px;
            }

            .nf-actions {
                flex-direction: column;
                align-items: stretch;
                max-width: 290px;
            }

            .btn-primary-404,
            .btn-ghost-404 {
                justify-content: center;
                padding: 15px 20px;
            }
        }
    </style>
</head>

<body>

    <nav id="main-nav">
        <a href="/" class="nav-logo">
            <img src="assets/images/JEKAFLY LOGO B-R 2.png" alt="Jekafly" />
        </a>
        <div class="nav-right">
            <a href="/" class="nav-link">Home</a>
            <a href="/apply" class="nav-cta-btn">Apply Now</a>
        </div>
    </nav>

    <div class="nf-page">

        <!-- Plane + 404 banner image — this IS the 404, no number repeated below -->
        <div class="nf-hero">
            <img src="assets/images/404-plane.png" alt="Jekafly aircraft towing a banner reading 404 — page not found"
                class="nf-hero-img" id="nf-plane-img" onload="this.classList.add('loaded')" />
        </div>

        <!-- Copy only — no 404 number here -->
        <div class="nf-content">
            <div class="nf-rule"></div>
            <h1 class="nf-heading">Page Not Found</h1>
            <p class="nf-sub">Looks like we hit some turbulence. The page you're looking for doesn't exist or may have
                been moved.</p>
            <div class="nf-actions">
                <a href="/" class="btn-primary-404">
                    Back to Home
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12" />
                        <polyline points="12 5 19 12 12 19" />
                    </svg>
                </a>
                <a href="/dashboard" class="btn-ghost-404">My Dashboard</a>
            </div>
        </div>

    </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script src="mobile.js" defer></script>
    <script>
        window.addEventListener('scroll', () => {
            document.querySelector('nav')?.classList.toggle('scrolled', window.scrollY > 20);
        });
    </script>

</body>

</html>
