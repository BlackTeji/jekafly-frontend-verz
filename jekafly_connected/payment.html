<script>
    let pendingPayment = null;
    let payMethod = 'card';

    document.addEventListener('DOMContentLoaded', async () => {
        await Auth.init();
        const user = Auth.getCurrent();
        const navCta = document.getElementById('nav-cta-area');

        if (!user) {
            window.location.href = 'index.html';
            return;
        }

        navCta.innerHTML = `<span class="nav-user-hi">Hi, <strong>${user.name.split(' ')[0]}</strong></span>
        <a href="dashboard.html" class="btn-outline btn-outline-link">Dashboard</a>`;

        try {
            pendingPayment = JSON.parse(localStorage.getItem('jkf_pending_payment'));
        } catch {
            pendingPayment = null;
        }

        const urlParams = new URLSearchParams(window.location.search);
        const returnRef = urlParams.get('ref') || urlParams.get('reference') || urlParams.get('trxref');

        if (returnRef) {
            await checkPaystackReturn();
            return;
        }

        if (!pendingPayment) {
            document.querySelector('.pay-page').innerHTML = `
                <div class="pay-empty">
                    <div class="pay-empty-icon">😕</div>
                    <h2 class="pay-empty-title">No pending payment found</h2>
                    <p class="pay-empty-sub">Start a new application to proceed to payment.</p>
                    <button class="btn-next" onclick="window.location.href='apply.html'">Start Application</button>
                </div>
            `;
            return;
        }

        document.getElementById('pay-name').value = user.name;

        if (pendingPayment.type === 'visa') {
            const data = visaRequirements[pendingPayment.destination] || {};
            document.getElementById('badge-title').textContent =
                (data.flag || '✈️') + ' ' + pendingPayment.destination + ' Visa';
            document.getElementById('badge-sub').textContent = 'Ref: ' + pendingPayment.ref;
        } else {
            document.getElementById('badge-title').textContent = '🛡️ ' + pendingPayment.plan;
            document.getElementById('badge-sub').textContent =
                pendingPayment.dest + ' · ' + pendingPayment.travellers + ' traveller(s)';
        }

        document.getElementById('transfer-ref').textContent =
            pendingPayment.ref || ('JKF-PAY-' + Date.now().toString().slice(-6));

        renderSummary();
    });

    function getPaymentTotal() {
        if (!pendingPayment) return 0;

        const fb = pendingPayment._feeBreakdown;

        if (pendingPayment.type === 'visa' && fb) {
            return Number(fb.total || 0);
        }

        if (pendingPayment.type === 'visa') {
            const amt = Number(pendingPayment.amount || 0);
            const svc = 25000;
            return amt + svc;
        }

        const amt = Number(pendingPayment.amount || 0);
        const svc = Math.round(amt * 0.05);
        return amt + svc;
    }

    function renderSummary() {
        if (!pendingPayment) return;

        const fb = pendingPayment._feeBreakdown;
        let rows = '';
        let total = getPaymentTotal();

        if (pendingPayment.type === 'visa' && fb) {
            rows = `
                <div class="order-row"><span class="label">Destination</span><span class="val">${pendingPayment.destination}</span></div>
                <div class="order-row order-ref-row"><span class="label">Application Ref</span><span class="val ref-copyable" onclick="copyRef(this)" title="Click to copy">${pendingPayment.ref} <span class="copy-icon">📋</span></span></div>
                <div class="order-row"><span class="label">Visa Processing Fee</span><span class="val">₦${fb.visaFee.toLocaleString()}</span></div>
                ${fb.extraTravellers > 0 ? `<div class="order-row"><span class="label">Additional Travellers (×${fb.extraTravellers})</span><span class="val">₦${fb.extraFee.toLocaleString()}</span></div>` : ''}
                <div class="order-row"><span class="label">Jekafly Service Fee</span><span class="val">₦${fb.serviceFee.toLocaleString()}</span></div>
            `;
        } else if (pendingPayment.type === 'visa') {
            const amt = Number(pendingPayment.amount || 0);
            const svc = 25000;
            rows = `
                <div class="order-row"><span class="label">Destination</span><span class="val">${pendingPayment.destination}</span></div>
                <div class="order-row order-ref-row"><span class="label">Application Ref</span><span class="val ref-copyable" onclick="copyRef(this)" title="Click to copy">${pendingPayment.ref} <span class="copy-icon">📋</span></span></div>
                <div class="order-row"><span class="label">Visa Processing Fee</span><span class="val">₦${amt.toLocaleString()}</span></div>
                <div class="order-row"><span class="label">Jekafly Service Fee</span><span class="val">₦${svc.toLocaleString()}</span></div>
            `;
        } else {
            const amt = Number(pendingPayment.amount || 0);
            const svc = Math.round(amt * 0.05);
            rows = `
                <div class="order-row"><span class="label">Insurance Plan</span><span class="val">${pendingPayment.plan}</span></div>
                <div class="order-row"><span class="label">Destination</span><span class="val">${pendingPayment.dest}</span></div>
                <div class="order-row"><span class="label">Travellers</span><span class="val">${pendingPayment.travellers}</span></div>
                <div class="order-row"><span class="label">Plan Cost</span><span class="val">₦${amt.toLocaleString()}</span></div>
                <div class="order-row"><span class="label">Processing Fee</span><span class="val">₦${svc.toLocaleString()}</span></div>
            `;
        }

        document.getElementById('summary-body').innerHTML = rows;
        document.getElementById('summary-total').textContent = '₦' + total.toLocaleString();
        document.getElementById('pay-btn-amount').textContent = '₦' + total.toLocaleString();
        document.getElementById('ussd-amount').textContent = total.toLocaleString();
    }

    function copyRef(el) {
        const ref = el.textContent.replace('📋', '').trim();
        navigator.clipboard.writeText(ref).then(() => {
            el.querySelector('.copy-icon').textContent = '✅';
            setTimeout(() => { el.querySelector('.copy-icon').textContent = '📋'; }, 2000);
        });
    }

    function setMethod(method, el) {
        payMethod = method;
        document.querySelectorAll('.method-tab').forEach(t => t.classList.remove('active'));
        el.classList.add('active');

        document.getElementById('method-card').style.display = method === 'card' ? 'block' : 'none';
        document.getElementById('method-transfer').style.display = method === 'transfer' ? 'block' : 'none';
        document.getElementById('method-ussd').style.display = method === 'ussd' ? 'block' : 'none';

        const btnText =
            method === 'ussd'
                ? "I've Paid via USSD ✓"
                : method === 'transfer'
                    ? "I've Made the Transfer ✓"
                    : "Pay " + document.getElementById('pay-btn-amount').textContent + " Securely 🔒";

        document.getElementById('btn-pay').textContent = btnText;
    }

    function formatCard(input) {
        let val = input.value.replace(/\D/g, '').slice(0, 16);
        input.value = val.replace(/(.{4})/g, '$1 ').trim();

        const icon = document.getElementById('card-icon');
        if (val.startsWith('4')) icon.textContent = '💳';
        else if (val.startsWith('5')) icon.textContent = '💳';
        else icon.textContent = '💳';
    }

    function formatExpiry(input) {
        let val = input.value.replace(/\D/g, '').slice(0, 4);
        if (val.length >= 2) val = val.slice(0, 2) + ' / ' + val.slice(2);
        input.value = val;
    }

    function validateCardForm() {
        if (payMethod !== 'card') return true;

        const name = document.getElementById('pay-name').value.trim();
        const card = document.getElementById('pay-card').value.replace(/\s/g, '');
        const expiry = document.getElementById('pay-expiry').value;
        const cvv = document.getElementById('pay-cvv').value;

        if (!name) {
            showToast('Please enter cardholder name.', 'error');
            return false;
        }
        if (card.length < 16) {
            showToast('Please enter a valid 16-digit card number.', 'error');
            return false;
        }
        if (!expiry.includes('/')) {
            showToast('Please enter a valid expiry date (MM / YY).', 'error');
            return false;
        }
        if (cvv.length < 3) {
            showToast('Please enter your 3 or 4 digit CVV.', 'error');
            return false;
        }

        return true;
    }

    async function processPayment() {
        if (!pendingPayment) {
            showToast('No pending payment found.', 'error');
            return;
        }

        if (!validateCardForm()) return;

        document.getElementById('pay-form-view').style.display = 'none';
        document.getElementById('pay-processing').classList.add('show');

        try {
            const user = Auth.getCurrent();
            const total = getPaymentTotal();
            const amountKobo = Math.round(total * 100);

            const res = await PaymentStore.initiate(
                (pendingPayment.type || 'visa').toUpperCase(),
                pendingPayment.ref || null,
                amountKobo,
                pendingPayment.email || user.email,
                {
                    destination: pendingPayment.destination || pendingPayment.dest || '',
                    plan: pendingPayment.plan || '',
                    callbackPage: 'payment.html'
                }
            );

            if (res?.ok && res.data?.authorizationUrl) {
                localStorage.setItem('jkf_last_payment_ref', pendingPayment.ref || '');
                window.location.href = res.data.authorizationUrl;
            } else {
                throw new Error(res?.error || 'Payment initiation failed.');
            }
        } catch (err) {
            document.getElementById('pay-processing').classList.remove('show');
            document.getElementById('pay-form-view').style.display = 'block';
            showToast(err.message || 'Payment failed. Please try again.', 'error');
        }
    }

    async function checkPaystackReturn() {
        const params = new URLSearchParams(window.location.search);
        const reference = params.get('ref') || params.get('reference') || params.get('trxref');

        if (!reference) return;

        document.getElementById('pay-form-view').style.display = 'none';
        document.getElementById('pay-processing').classList.add('show');

        try {
            const res = await PaymentStore.verify(reference);
            document.getElementById('pay-processing').classList.remove('show');

            if (res?.ok && res.data?.status === 'success') {
                localStorage.removeItem('jkf_pending_payment');
                localStorage.setItem('jkf_last_verified_payment', JSON.stringify(res.data));

                window.location.href = `receipt.html?reference=${encodeURIComponent(reference)}`;
                return;
            }

            showToast('Payment could not be verified. Please contact support.', 'error');
            document.getElementById('pay-form-view').style.display = 'block';
        } catch (err) {
            document.getElementById('pay-processing').classList.remove('show');
            document.getElementById('pay-form-view').style.display = 'block';
            showToast(err.message || 'Payment verification failed.', 'error');
        }
    }
</script>
