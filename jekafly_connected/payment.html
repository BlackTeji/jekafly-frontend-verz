    <div class="nav-mobile-drawer" id="nav-mobile-drawer">
        <div class="nav-mob-list">
            <a href="/" onclick="closeNavMenu()" class="nav-mob-row">
                <span class="nav-mob-row-icon" style="background:#EEF2FF;color:#3B5BDB;">

    <div class="pay-page">
        <div id="pay-root"></div>
    </div>

    <div class="success-overlay" id="pay-success-overlay">
        <div class="success-modal">
            <div class="success-icon-wrap"><svg xmlns="http://www.w3.org/2000/svg" width="32" height="32"
                    viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round"
                    stroke-linejoin="round">
                    <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14" />
                    <path d="m9 11 3 3L22 4" />
                </svg></div>
            <h2>Payment Confirmed!</h2>
            <p>Your application is now active and under expert review. A confirmation email has been sent to you.</p>
            <div class="receipt" id="receipt-box"></div>
            <div class="success-actions">
                <button class="btn-dashboard" onclick="window.location.href='dashboard.html'">Go to My Dashboard
                    &rarr;</button>
                <button class="btn-home" onclick="window.location.href='/'">Back to Home</button>
            </div>
        </div>

    <script src="assets/js/api.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        let pendingPayment = null;

        document.addEventListener('DOMContentLoaded', async () => {
            PricingStore.get().then(pr => { if (pr) window._livePricing = pr; }).catch(() => { });
            const urlParams = new URLSearchParams(window.location.search);
            const returnRef = urlParams.get('ref') || urlParams.get('reference') || urlParams.get('trxref');
        
            if (returnRef) {
                renderProcessing();
                await Auth.init();
                updateNav();
                checkPaystackReturn(returnRef);
                return;
            }
            await Auth.init();
            const user = Auth.getCurrent();
            if (!user) { window.location.href = '/'; return; }
            updateNav();
            try { pendingPayment = JSON.parse(localStorage.getItem('jkf_pending_payment')); } catch { }
            if (!pendingPayment) {
                document.getElementById('pay-root').innerHTML =
                    '<div class="pay-box pay-empty"><div class="pay-empty-icon">&#128533;</div><h2>No pending payment</h2><p>Start a new application to proceed to payment.</p><button class="btn-start" onclick="window.location.href=\'apply.html\'">Start Application</button></div>';
                return;
            }
            renderLayout();
        });

        function renderLayout() {
            const p = pendingPayment;
            const fb = p._feeBreakdown;
            let rows = [], total = p.amount || 0;
            let flag = '&#9992;', destName = '', destRef = '';

            if (p.type === 'visa' || !p.type) {
                const vr = window.visaRequirements?.[p.destination] || {};
                flag = vr.flag || '&#9992;';
                destName = (vr.flag ? vr.flag + ' ' : '') + (p.destination || '') + ' Visa';
                destRef = p.ref ? 'Ref: ' + p.ref : '';
                if (fb) {
                    total = fb.total;
                    rows.push({ l: 'Visa Processing Fee', v: '&#8358;' + fb.visaFee.toLocaleString() });
                    if (fb.extraTravellers > 0) rows.push({ l: 'Additional Travellers (&times;' + fb.extraTravellers + ')', v: '&#8358;' + fb.extraFee.toLocaleString() });
                    rows.push({ l: 'Jekafly Service Fee', v: '&#8358;' + fb.serviceFee.toLocaleString() });
                } else {
                    rows.push({ l: 'Visa Processing Fee', v: '&#8358;' + (p.amount || 0).toLocaleString() });
                }
                if (p.ref) rows.push({ l: 'Application Ref', v: p.ref, isRef: true });
            } else if (p.type === 'consultation') {
                flag = '&#128172;'; destName = p.plan || 'Travel Consultation';
                destRef = 'One-on-one session with a dedicated visa expert';
                rows.push({ l: 'Package', v: p.plan || '&mdash;' });
                rows.push({ l: 'Session Type', v: 'Video Call &mdash; Visa Strategy' });
                rows.push({ l: 'Amount', v: '&#8358;' + (p.amount || 0).toLocaleString() });
            } else if (p.type === 'flight') {
                flag = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 256 256" fill="#0D1560"><path d="M185.33,114.21l29.14-27.42.17-.17a32,32,0,0,0-45.26-45.26c0,.06-.11.11-.17.17L141.79,70.67l-83-30.2a8,8,0,0,0-8.39,1.86l-24,24a8,8,0,0,0,1.22,12.31l63.89,42.59L76.69,136H56a8,8,0,0,0-5.65,2.34l-24,24A8,8,0,0,0,29,175.42l36.82,14.73,14.7,36.75.06.16a8,8,0,0,0,13.18,2.47l23.87-23.88A8,8,0,0,0,120,200V179.31l14.76-14.76,42.59,63.89a8,8,0,0,0,12.31,1.22l24-24a8,8,0,0,0,1.86-8.39Z"/></svg>';
                destName = (p.origin || '') + ' &rarr; ' + (p.destination || 'Flight');
                destRef = (p.departDate ? 'Departs ' + new Date(p.departDate).toLocaleDateString('en-NG', { day: 'numeric', month: 'short', year: 'numeric' }) : '') + (p.passengers ? ' &middot; ' + p.passengers + ' passenger' + (p.passengers > 1 ? 's' : '') : '');
                rows.push({ l: 'Route', v: (p.origin || '—') + ' → ' + (p.destination || '—') });
                rows.push({ l: 'Trip Type', v: p.tripType || 'Round Trip' });
                rows.push({ l: 'Depart Date', v: p.departDate ? new Date(p.departDate).toLocaleDateString('en-NG') : '—' });
                if (p.returnDate) rows.push({ l: 'Return Date', v: new Date(p.returnDate).toLocaleDateString('en-NG') });
                rows.push({ l: 'Passengers', v: String(p.passengers || 1) });
                rows.push({ l: 'Class', v: p.cabinClass || 'Economy' });
                rows.push({ l: 'Airline', v: p.airline || '—' });
                rows.push({ l: 'Ticket Amount', v: '&#8358;' + (p.amount || 0).toLocaleString() });
                if (p.ref) rows.push({ l: 'Booking Ref', v: p.ref, isRef: true });
            } else if (p.type === 'hotel') {
                flag = '<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 256 256" fill="#0D1560"><path d="M24,104H48v64H32a8,8,0,0,0,0,16H224a8,8,0,0,0,0-16H208V104h24a8,8,0,0,0,4.19-14.81l-104-64a8,8,0,0,0-8.38,0l-104,64A8,8,0,0,0,24,104Zm40,0H96v64H64Zm80,0v64H112V104Zm48,64H160V104h32ZM128,41.39,203.74,88H52.26ZM248,208a8,8,0,0,1-8,8H16a8,8,0,0,1,0-16H240A8,8,0,0,1,248,208Z"/></svg>';
                destName = p.hotelName || 'Hotel Reservation';
                destRef = (p.destination || '') + (p.checkIn ? ' &middot; Check-in ' + new Date(p.checkIn).toLocaleDateString('en-NG', { day: 'numeric', month: 'short' }) : '');
                rows.push({ l: 'Hotel', v: p.hotelName || '—' });
                rows.push({ l: 'Location', v: p.destination || '—' });
                rows.push({ l: 'Check-in', v: p.checkIn ? new Date(p.checkIn).toLocaleDateString('en-NG') : '—' });
                rows.push({ l: 'Check-out', v: p.checkOut ? new Date(p.checkOut).toLocaleDateString('en-NG') : '—' });
                rows.push({ l: 'Rooms', v: String(p.rooms || 1) });
                rows.push({ l: 'Guests', v: String(p.guests || 1) });
                rows.push({ l: 'Room Cost', v: '&#8358;' + (p.amount || 0).toLocaleString() });
                if (p.ref) rows.push({ l: 'Reservation Ref', v: p.ref, isRef: true });
            } else {
                flag = '&#128737;'; destName = p.plan || 'Travel Insurance';
                destRef = (p.dest || 'Worldwide') + (p.travellers ? ' &middot; ' + p.travellers + ' traveller' + (p.travellers > 1 ? 's' : '') : '');
                const _procPct = (window._livePricing?.processingFeePercent ?? 5) / 100;
                const svc = Math.round((p.amount || 0) * _procPct);
                total = (p.amount || 0) + svc;
                rows.push({ l: 'Insurance Plan', v: p.plan || '&mdash;' });
                rows.push({ l: 'Destination', v: p.dest || 'Worldwide' });
                rows.push({ l: 'Travel Date', v: p.date || '&mdash;' });
                rows.push({ l: 'Travellers', v: String(p.travellers || 1) });
                rows.push({ l: 'Plan Cost', v: '&#8358;' + (p.amount || 0).toLocaleString() });
                rows.push({ l: 'Processing Fee (' + Math.round(_procPct * 100) + '%)', v: '&#8358;' + svc.toLocaleString() });
            }
            pendingPayment.amount = total;

            const totalStr = '&#8358;' + total.toLocaleString();
            const lineItemsHtml = rows.map(r =>
                '<div class="line-item"><span class="li-label">' + r.l + '</span>' +
                '<span class="li-val' + (r.isRef ? ' ref-val' : '') + '"' + (r.isRef ? ' onclick="copyRef(this)" title="Click to copy"' : '') + '>' +
                r.v + (r.isRef ? ' <span data-ref="' + r.v + '">Copy</span>' : '') + '</span></div>'
            ).join('') +
                '<div class="line-item total-line"><span class="li-label">Total Due</span><span class="li-val">' + totalStr + '</span></div>';

            document.getElementById('pay-root').innerHTML =
                '<div class="pay-layout">' +
                '<div class="summary-panel">' +
                '<div><div class="page-eyebrow">Secure Checkout</div>' +
                '<h1 class="page-title">Review Your Order</h1>' +
                '<p class="page-sub">Confirm the details below, then click Pay to complete your payment securely via Paystack.</p></div>' +
                '<div class="dest-card"><div class="dest-card-top">' +
                '<div class="dest-flag-box">' + flag + '</div>' +
                '<div class="dest-card-info"><div class="dest-card-name">' + destName + '</div><div class="dest-card-ref">' + destRef + '</div></div>' +
                '<div class="dest-card-amount"><small>Total</small>' + totalStr + '</div>' +
                '</div></div>' +
                '<div class="line-items">' + lineItemsHtml + '</div>' +
                '<div class="included-strip"><span><svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg></span><span><strong>What&#39;s included:</strong> ' + (p.type === 'consultation' ? 'A dedicated Jekafly visa expert will review your profile, advise on the strongest application strategy, check your document checklist, and answer all your visa questions in a live session.' : p.type === 'insurance' ? 'Emergency medical cover, trip cancellation protection, baggage loss compensation, and 24/7 travel assistance — as per your selected plan.' : p.type === 'flight' ? 'Confirmed flight booking with e-ticket, booking reference, and passenger itinerary sent to your email.' : p.type === 'hotel' ? 'Confirmed hotel reservation with voucher, reservation reference, and check-in details sent to your email.' : 'Expert document review by a visa specialist, embassy submission, real-time application tracking, and a dedicated support agent throughout the process.') + '</span></div>' +
                '</div>' +
                '<div class="pay-panel"><div class="pay-box" id="pay-box-main">' +
                '<div id="pay-form-view">' +
                '<div class="pay-box-header"><div class="pay-box-title">Complete Payment</div><div class="pay-box-sub">You&#39;ll be prompted to pay securely via Paystack</div></div>' +
                '<div class="pay-total-display"><span class="pay-total-currency">&#8358;</span><span class="pay-total-amount">' + total.toLocaleString() + '</span></div>' +
                '<div class="pay-divider"></div>' +
                '<div class="pay-cta-wrap"><button class="btn-pay" id="btn-pay" onclick="processPayment()">Pay ' + totalStr + ' Securely <span class="btn-pay-sub">&#128274;</span></button></div>' +
                '<div class="trust-row"><span class="trust-badge">&#128274; SSL Encrypted</span><span class="trust-badge">&#127470;&#127468; CBN Compliant</span><span class="trust-badge">&#9889; Paystack</span></div>' +
                '</div>' +
                '<div class="pay-processing" id="pay-processing"><div class="spinner"></div><div class="processing-title">Connecting to Paystack...</div><div class="processing-sub">Please wait, do not close this tab.</div></div>' +
                '</div></div></div>';
        }

        function renderProcessing() {
            document.getElementById('pay-root').innerHTML =
                '<div class="pay-box w-full max-w-440"><div class="pay-processing show"><div class="spinner"></div><div class="processing-title">Verifying payment...</div><div class="processing-sub">Please wait.</div></div></div>';
        }

        function copyRef(el) {
            const span = el.querySelector('span');
            const ref = el.dataset.ref || el.textContent.replace('Copy', '').trim();
            navigator.clipboard.writeText(ref).then(() => {
                if (span) { span.textContent = 'Copied'; }
                setTimeout(() => { if (span) span.textContent = 'Copy'; }, 2000);
            });
        }

        async function handlePaystackCallback(ref) {
            document.getElementById('pay-form-view').style.display = 'none';
            document.getElementById('pay-processing').classList.add('show');
            localStorage.removeItem('jkf_pending_payment');
            const verify = await PaymentStore.verify(ref);
            document.getElementById('pay-processing').classList.remove('show');
            if (verify?.ok && verify.data?.status === 'success') {
                const r = verify.data;
                const now = new Date().toLocaleString('en-NG', { dateStyle: 'medium', timeStyle: 'short' });
                document.getElementById('receipt-box').innerHTML =
                    '<div class="receipt-row"><span class="rl">Transaction ID</span><span class="rv tx">' + ref + '</span></div>' +
                    '<div class="receipt-row"><span class="rl">Date &amp; Time</span><span class="rv">' + now + '</span></div>' +
                    (r.ref ? '<div class="receipt-row"><span class="rl">Application Ref</span><span class="rv tx">' + r.ref + '</span></div>' : '') +
                    '<div class="receipt-row"><span class="rl">Amount Paid</span><span class="rv amount">&#8358;' + (r.amount || 0).toLocaleString() + '</span></div>' +
                    '<div class="receipt-row"><span class="rl">Status</span><span class="rv text-green fw-700">Confirmed</span></div>';
                // If consultation — route to dashboard Calendly flow
                const _ptype = (pendingPayment?.type || '');
                if (_ptype === 'consultation') {
                    document.querySelector('.success-modal h2').textContent = 'Payment Confirmed!';
                    document.querySelector('.success-modal p').textContent = 'Your consultation fee has been received. Click below to pick your booking time.';
                    document.querySelector('.btn-dashboard').textContent = 'Pick a Booking Time →';
                    document.querySelector('.btn-dashboard').onclick = function () {
                        window.location.href = 'dashboard.html?tab=documents&consult_ref=' + encodeURIComponent(ref);
                    };
                }
                document.getElementById('pay-success-overlay').classList.add('show');
                updateNav();
            } else {
                document.getElementById('pay-form-view').style.display = 'block';
                showToast('Payment could not be verified. Contact support.', 'error');
            }
        }

        async function processPayment() {
            const btn = document.getElementById('btn-pay');
            btn.disabled = true; btn.textContent = 'Connecting...';
            document.getElementById('pay-form-view').style.display = 'none';
            document.getElementById('pay-processing').classList.add('show');
            try {
                const user = Auth.getCurrent();
                const amountKobo = Math.round((pendingPayment.amount || 0) * 100);
                const res = await PaymentStore.initiate(
                    (pendingPayment.type || 'visa').toUpperCase(),
                    pendingPayment.ref || null, amountKobo,
                    pendingPayment.email || user.email,
                    { destination: pendingPayment.destination || pendingPayment.dest, plan: pendingPayment.plan, date: pendingPayment.date, travelDate: pendingPayment.date, travellers: pendingPayment.travellers }
                );
                if (!res?.ok) throw new Error(res?.error || 'Payment initiation failed.');
                const { accessCode, reference, publicKey } = res.data;
                document.getElementById('pay-processing').classList.remove('show');
                document.getElementById('pay-form-view').style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Pay &#8358;' + (pendingPayment.amount || 0).toLocaleString() + ' Securely <span class="btn-pay-sub">&#128274;</span>';
                const handler = PaystackPop.setup({
                    key: publicKey,
                    email: pendingPayment.email || user.email,
                    amount: amountKobo,
                    access_code: accessCode,
                    ref: reference,
                    onClose: function () { showToast('Payment cancelled.', 'error'); },
                    callback: function (response) { handlePaystackCallback(response.reference || reference); }
                });
                handler.openIframe();
            } catch (err) {
                document.getElementById('pay-processing').classList.remove('show');
                document.getElementById('pay-form-view').style.display = 'block';
                btn.disabled = false;
                btn.innerHTML = 'Pay &#8358;' + (pendingPayment.amount || 0).toLocaleString() + ' Securely <span class="btn-pay-sub">&#128274;</span>';
                showToast(err.message || 'Payment failed. Please try again.', 'error');
            }
        }

        async function checkPaystackReturn(reference) {
            const res = await PaymentStore.verify(reference);
            if (res?.ok && res.data?.status === 'success') {
                const r = res.data;
                const now = new Date().toLocaleString('en-NG', { dateStyle: 'medium', timeStyle: 'short' });
                document.getElementById('receipt-box').innerHTML =
                    '<div class="receipt-row"><span class="rl">Transaction ID</span><span class="rv tx">' + reference + '</span></div>' +
                    '<div class="receipt-row"><span class="rl">Date &amp; Time</span><span class="rv">' + now + '</span></div>' +
                    (r.ref ? '<div class="receipt-row"><span class="rl">Application Ref</span><span class="rv tx">' + r.ref + '</span></div>' : '') +
                    '<div class="receipt-row"><span class="rl">Amount Paid</span><span class="rv amount">&#8358;' + (r.amount || 0).toLocaleString() + '</span></div>' +
                    '<div class="receipt-row"><span class="rl">Status</span><span class="rv text-green fw-700">Confirmed</span></div>';
                // If consultation — route to dashboard Calendly flow
                const _ptype = (pendingPayment?.type || '');
                if (_ptype === 'consultation') {
                    document.querySelector('.success-modal h2').textContent = 'Payment Confirmed!';
                    document.querySelector('.success-modal p').textContent = 'Your consultation fee has been received. Click below to pick your booking time.';
                    document.querySelector('.btn-dashboard').textContent = 'Pick a Booking Time →';
                    document.querySelector('.btn-dashboard').onclick = function () {
                        window.location.href = 'dashboard.html?tab=documents&consult_ref=' + encodeURIComponent(ref);
                    };
                }
                const _ptype2 = (pendingPayment?.type || '');
                if (_ptype2 === 'consultation') {
                    document.querySelector('.success-modal h2').textContent = 'Payment Confirmed!';
                    document.querySelector('.success-modal p').textContent = 'Your consultation fee has been received. Click below to pick your booking time.';
                    document.querySelector('.btn-dashboard').textContent = 'Pick a Booking Time →';
                    document.querySelector('.btn-dashboard').onclick = function () {
                        window.location.href = 'dashboard.html?tab=documents&consult_ref=' + encodeURIComponent(reference);
                    };
                }
                document.getElementById('pay-success-overlay').classList.add('show');
                updateNav();
            } else {
                showToast('Payment could not be verified. Please contact support.', 'error');
            }
        }

        window.addEventListener('scroll', () => {
            document.querySelector('nav')?.classList.toggle('scrolled', window.scrollY > 20);
        });

    </script>
    <script src="mobile.js" defer></script>
    <script src="assets/js/session.js" defer></script>

    <script>
        (function () {
            if (typeof IntersectionObserver === 'undefined') return;
            var selectors = [
                '.service-card', '.step', '.dest-card', '.testi-card',
                '.ins-plan', '.ins-feature', '.section-header', '.checker-form',
                '.checker-info', '.cta-banner', '.info-list li', '.dest-card',
                '.aff-step', '.aff-tier', '.aff-perk', '.aff-faq-item',
                '.aff-stat', '.aff-section-header', '.aff-form-card',
                '.stat-card', '.astat', '.dash-section', '.result-wrap',
                '.perk-item', '.login-aside', '.payment-card', '.track-wrap',
                '.rev-card', '.admin-section'
            ];
            var observer = new IntersectionObserver(function (entries) {
                entries.forEach(function (e) {
                    if (e.isIntersecting) {
                        e.target.classList.add('visible');
                        observer.unobserve(e.target);
                    }
                });
            }, { threshold: 0.08, rootMargin: '0px 0px -40px 0px' });

            function init() {
                selectors.forEach(function (sel) {
                    document.querySelectorAll(sel).forEach(function (el, i) {
                        el.classList.add('reveal');
                        if (i > 0 && i < 5) el.classList.add('reveal-delay-' + i);
                        observer.observe(el);
                    });
                });
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        }());
    </script>
</body>

</html>
